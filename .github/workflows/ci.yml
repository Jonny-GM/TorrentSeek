name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - if: runner.os == 'Linux'
        run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  # Catch platform breakage before merge; release.yml does the real builds.
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: VERSION=ci-check ./scripts/release-build.sh
